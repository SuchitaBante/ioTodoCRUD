<div class="mt-4">

    <h3>Todo List</h3>

    <ul class="list-group">

        <li class="list-group-item d-flex justify-content-between align-items-center" *ngFor="let todo of todoArr">


            <div>
                <strong>{{ todo.todoItem }}</strong>
                <span class="ms-2">({{ todo.todoStatus }})</span>
            </div>


            <div>
                <button class="btn btn-sm text-primary me-2" (click)="onEdit(todo)" title="Edit">

                    <i class="bi bi-pencil-square fs-5"></i>
                </button>

                
                <button class="btn btn-sm btn-danger" (click)="onDelete(todo.todoId)" title="Delete">

                    <i class="bi bi-trash"></i>

                </button>

            </div>

        </li>

    </ul>

</div>
